<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Edição Diária — um almanaque de treino orientado por tags</title>
  <meta name="description" content="Um almanaque de treino orientado por tags: abra-o diariamente para uma sessão de treino coerente e baseada na data." />
  <meta name="color-scheme" content="dark" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Big+Shoulders+Display:wght@600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <div class="sheet">
    <header class="masthead">
      <span class="brand">A&nbsp;Edição&nbsp;Diária</span>
      <span class="brand-rule" aria-hidden="true"></span>
      <nav class="mast-nav">
        <a href="index.html" class="is-current" aria-current="page">A edição de hoje</a>
        <a href="catalog.html">O catálogo</a>
      </nav>
    </header>

    <section class="controls" aria-label="Configurações da sessão">
      <div class="ctl ctl-date" role="group" aria-label="Data">
        <button id="prevDay" type="button" aria-label="Dia anterior">‹</button>
        <button id="today" type="button">Hoje</button>
        <button id="nextDay" type="button" aria-label="Próximo dia">›</button>
      </div>
      <div class="ctl">
        <label for="phaseSelect">Fase</label>
        <select id="phaseSelect"></select>
      </div>
      <div class="ctl">
        <label for="freqSelect">Dias / semana</label>
        <select id="freqSelect"></select>
      </div>
    </section>

    <section id="hero" class="hero"></section>
    <section id="weekstrip" class="weekstrip"></section>
    <main id="program" class="program"></main>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/routines.js"></script>
  <script src="assets/engine.js"></script>
  <script src="assets/bodymap.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
