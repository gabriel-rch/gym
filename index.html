<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Daily Edition — a tag-driven training almanac</title>
  <meta name="description" content="A tag-driven workout almanac: open it daily for a coherent, date-seeded training session." />
  <meta name="color-scheme" content="dark" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Big+Shoulders+Display:wght@600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <div class="sheet">
    <header class="masthead">
      <span class="brand">The&nbsp;Daily&nbsp;Edition</span>
      <span class="brand-rule" aria-hidden="true"></span>
      <span class="brand-sub">a tag-driven training almanac</span>
    </header>

    <section class="controls" aria-label="Session settings">
      <div class="ctl ctl-date" role="group" aria-label="Date">
        <button id="prevDay" type="button" aria-label="Previous day">‹</button>
        <button id="today" type="button">Today</button>
        <button id="nextDay" type="button" aria-label="Next day">›</button>
      </div>
      <div class="ctl">
        <label for="phaseSelect">Phase</label>
        <select id="phaseSelect"></select>
      </div>
      <div class="ctl">
        <label for="freqSelect">Days / week</label>
        <select id="freqSelect"></select>
      </div>
    </section>

    <section id="hero" class="hero"></section>
    <section id="weekstrip" class="weekstrip"></section>
    <main id="program" class="program"></main>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/routines.js"></script>
  <script src="assets/engine.js"></script>
  <script src="assets/bodymap.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
